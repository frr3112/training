<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training Portal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }
    header {
      background-color: #333;
      color: white;
      padding: 20px;
      border-radius: 5px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .content {
      background-color: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    h1 {
      margin: 0;
    }
    h2 {
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Training Portal</h1>
      <p>Welcome to our training platform</p>
    </header>
    
    <div class="content">
      <h2>Welcome</h2>
      <p>This is your training portal where you can access courses and resources.</p>
      
      <h2>Getting Started</h2>
      <ul>
        <li>Browse available courses</li>
        <li>Complete training modules</li>
        <li>Track your progress</li>
      </ul>
    </div>
  </div>
</body>
</html>
